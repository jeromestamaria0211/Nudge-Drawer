<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rating Drawer</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }
  .phone {
    width: 375px;
    height: 812px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  .bg-image {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  .bg-image img {
    width: 375px;
    height: 812px;
    object-fit: fill;
    display: block;
  }
  .bg-image-fill {
    display: none;
  }

  .drawer-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 8;
    pointer-events: none;
  }
  .status-bar {
    display: none;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .app-header {
    display: none;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  .drawer {
    position: absolute;
    top: 310px;
    bottom: 0; left: 0; right: 0;
    background: #faf9f5;
    border-radius: 20px 20px 0 0;
    overflow: visible;
    padding-bottom: 40px;
    z-index: 10;
  }
  .drawer-handle {
    display: flex;
    justify-content: center;
    padding-top: 24px;
    margin-bottom: 24px;
  }
  .drawer-title {
    font-size: 21px;
    font-weight: 800;
    color: #1a1a1a;
    text-align: center;
    letter-spacing: -0.4px;
    padding: 0 24px;
    line-height: 1.25;
    font-family: 'AgrandirTight', sans-serif;
  }
  .drawer-subtitle {
    font-size: 15px;
    color: #1a1a1a;
    text-align: center;
    padding: 0 36px;
    line-height: 1.5;
    margin-top: 8px;
  }
  .cards-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 22px 20px 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .cards-scroll::-webkit-scrollbar { display: none; }
  .recipe-card { min-width: 200px; flex-shrink: 0; display: flex; flex-direction: column; }
  .recipe-card .card-name { flex: 1; }

  .card-image {
    width: 100%; height: 198px;
    border-radius: 12px;
    overflow: hidden;
    background: #e0ddd5;
  }
  .card-image img { width: 100%; height: 100%; object-fit: cover; }
  .card-name {
    font-size: 15px; font-weight: 700;
    color: #1a1a1a; margin-top: 10px;
    line-height: 1.35; letter-spacing: -0.2px;
    font-family: 'AgrandirTight', sans-serif;
  }
  .card-ordered { font-size: 13px; color: #1a1a1a; margin-top: 8px; }
  .stars {
    display: flex;
    gap: 5px;
    margin-top: 16px;
    position: static;
  }

  .card-lottie-wrapper {
    position: relative;
  }
  .star { width: 28px; height: 26px; cursor: pointer; flex-shrink: 0; }
  .star svg { width: 28px; height: 26px; pointer-events: none; }

  /* Lottie overlays — direct children of .phone, positioned dynamically via JS */
  .lottie-flow {
    position: absolute;
    width: 64px;
    height: 64px;
    pointer-events: none;
    z-index: 999;
    display: none;
    transform: translate(-50%, -50%);
  }
  .lottie-flow.playing { display: block; }

  .lottie-burst, .lottie-heart {
    position: absolute;
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 999;
    display: none;
    transform: translate(-50%, -50%);
  }
  .lottie-burst.playing, .lottie-heart.playing {
    display: block;
  }

  const s2 = document.getElementById('s2');

  let saved2 = 0;
  let star4Fired2 = false;
  let star5Fired2 = false;

      const v = +star.dataset.v;
      const prev2 = saved2;

      if (v !== 5) star5Fired2 = false;
